<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<title>Mod</title>

<style>
body {
  margin: 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
  background: white;
  color: #111;
  font-size: 18px;
}

/* HEADER */
header {
  padding: 40px 60px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative;
}

/* LOGO */
.logo {
  width: 70px;
  animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* SAVE BUTTON */
.save {
  position: absolute;
  top: 40px;
  right: 60px;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 2px;
  cursor: pointer;
  user-select: none;
}

/* MAIN */
main {
  padding: 0 60px 80px 60px;
  max-width: 900px;
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 500px;
  font-family: inherit;
  font-size: 16px;
  line-height: 1.5;
  border: none;
  outline: none;
  resize: vertical;
  background: transparent;
  color: #111;
  margin-top: 20px;
}
</style>

<!-- 🔥 slugify core -->
<script src="/slugify.js"></script>

</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <div class="save" onclick="forceSave()">Save</div>
</header>

<main>
  <textarea id="editor"></textarea>
</main>

<script>
let timeout;

// =========================
// LOAD
// =========================
async function load() {
  const res = await fetch("/topics.txt");
  const text = await res.text();

  document.getElementById("editor").value = text;
}

// =========================
// NORMALIZE TOPICS (🔥 NEW)
// убирает дубли ДО сохранения
// =========================
function normalizeTopics(text) {
  const seen = new Set();

  return text
    .split("\n")
    .map(t => t.trim())
    .filter(Boolean)
    .filter(line => {
      const key = slugify(line); // 🔥 единая идентичность

      if (seen.has(key)) return false;
      seen.add(key);

      return true;
    })
    .join("\n");
}

// =========================
// SAVE
// =========================
async function save(value) {
  const cleaned = normalizeTopics(value); // 🔥 защита от дублей

  await fetch("/api/topics", {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: cleaned
  });
}

// =========================
// MANUAL SAVE
// =========================
function forceSave() {
  const value = document.getElementById("editor").value;
  save(value);
}

// =========================
// AUTOSAVE
// =========================
document.addEventListener("input", (e) => {
  if (e.target.id !== "editor") return;

  clearTimeout(timeout);

  timeout = setTimeout(() => {
    const value = e.target.value;
    save(value);
  }, 400);
});

load();
</script>

</body>
</html>
