<!-- FILE: public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndexMod</title>

<link rel="icon" href="/favicon.svg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fafafa;
  color: #111;
}

/* HEADER BUTTON */
#add {
  position: fixed;
  top: 30px;
  right: 30px;
  font-size: 16px;
  text-decoration: none;
  color: #111;
  cursor: pointer;
}

#add:hover {
  opacity: 0.6;
}

/* LIST */
main {
  padding: 120px 60px;
  max-width: 900px;
  margin: 0 auto;
}

.item {
  padding: 10px 0;
  font-size: 20px;
}

.item a {
  color: #111;
  text-decoration: none;
}

.item a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<a id="add" href="/editor.html">Add new page</a>

<main id="list"></main>

<script>
async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  const list = document.getElementById("list");

  list.innerHTML = pages
    .sort((a,b) => (a.title||"").localeCompare(b.title||""))
    .map(p => {
      return `
        <div class="item">
          <a href="/${p.slug}">
            ${escapeHtml(p.title || p.slug)}
          </a>
        </div>
      `;
    })
    .join("");
}

function escapeHtml(str="") {
  return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

load();
</script>

</body>
</html>
