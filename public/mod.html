<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<title>Mod</title>

<style>
body {
  margin: 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
  background: white;
  color: #111;
  font-size: 18px;
}

header {
  padding: 40px 60px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative;
}

.logo {
  width: 70px;
  animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

.save {
  position: absolute;
  top: 40px;
  right: 60px;
  font-size: 20px;
  letter-spacing: 2px;
  cursor: pointer;
  user-select: none;
}

main {
  padding: 0 60px 80px 60px;
  max-width: 900px;
}

textarea {
  width: 100%;
  height: 500px;
  font-family: inherit;
  font-size: 18px; /* 🔥 увеличили */
  line-height: 1.6;
  border: none;
  outline: none;
  resize: vertical;
  background: transparent;
  color: #111;
  margin-top: 20px;
}
</style>

<script src="/slugify.js"></script>

</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <div class="save" onclick="forceSave()">Save</div>
</header>

<main>
  <textarea id="editor"></textarea>
</main>

<script>
let timeout;

// =========================
// LOAD
// =========================
async function load() {
  try {
    const res = await fetch("/topics.txt");

    if (!res.ok) {
      console.error("LOAD ERROR", res.status);
      return;
    }

    const text = await res.text();
    document.getElementById("editor").value = text;
  } catch (e) {
    console.error("LOAD FAIL", e);
  }
}

// =========================
// NORMALIZE
// =========================
function normalizeTopics(text) {
  const seen = new Set();

  return text
    .split("\n")
    .map(t => t.trim())
    .filter(Boolean)
    .filter(line => {
      const key = smartSlug(line); // 🔥 ВАЖНО (не slugify)

      if (seen.has(key)) return false;
      seen.add(key);

      return true;
    })
    .join("\n");
}

// =========================
// SAVE CORE
// =========================
async function save(value) {
  const cleaned = normalizeTopics(value);

  try {
    const res = await fetch("/api/topics", {
      method: "POST",
      headers: {
        "Content-Type": "text/plain"
      },
      body: cleaned
    });

    if (!res.ok) {
      console.error("SAVE ERROR", res.status);
      return;
    }

    // 🔥 ОБНОВЛЯЕМ UI ПОСЛЕ СОХРАНЕНИЯ
    document.getElementById("editor").value = cleaned;

    console.log("saved");
  } catch (e) {
    console.error("SAVE FAIL", e);
  }
}

// =========================
// FORCE SAVE
// =========================
function forceSave() {
  const value = document.getElementById("editor").value;
  save(value);
}

// =========================
// AUTOSAVE
// =========================
document.getElementById("editor").addEventListener("input", (e) => {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    save(e.target.value);
  }, 500);
});

load();
</script>

</body>
</html>
