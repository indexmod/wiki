<!-- FILE: editor.html -->
<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<title>Editor</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fafafa;
  color: #111;
}

header {
  padding: 40px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  width: 70px;
}

/* SAVE TOP RIGHT */
.save {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 18px;
  cursor: pointer;
  user-select: none;
}

/* VIEW BUTTON TOP RIGHT (under save) */
.view {
  position: fixed;
  top: 55px;
  right: 20px;
  font-size: 14px;
  cursor: pointer;
  color: #777;
}

main {
  padding: 80px 60px 60px;
  max-width: 900px;
}

#title {
  font-size: 36px;
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  height: 400px;
  border: none;
  outline: none;
  font-size: 18px;
  line-height: 1.6;
  background: transparent;
}
</style>

<script src="/slugify.js"></script>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>
</header>

<div class="save" onclick="save()">Save</div>
<div class="view" id="viewBtn" style="display:none" onclick="goView()">View</div>

<main>
  <input id="title" placeholder="Title" />
  <textarea id="content" placeholder="Start writing..."></textarea>
</main>

<script>
const params = new URLSearchParams(location.search);
let id = params.get("id");

const titleInput = document.getElementById("title");
const contentInput = document.getElementById("content");
const viewBtn = document.getElementById("viewBtn");

let currentSlug = null;

// =========================
// LOAD
// =========================
async function load() {
  if (!id) return;

  const res = await fetch("/api/page/" + id);
  if (!res.ok) return;

  const data = await res.json();

  titleInput.value = data.title || "";
  contentInput.value = data.content || "";

  currentSlug = data.slug;

  viewBtn.style.display = "block";
}

// =========================
// SAVE (UPSERT)
// =========================
async function save() {
  const title = titleInput.value.trim();
  const content = contentInput.value;

  const res = await fetch("/api/page/" + (id || ""), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, content })
  });

  const page = await res.json();

  id = page.id;
  currentSlug = page.slug;

  viewBtn.style.display = "block";

  // НЕ уводим в индекс
  history.replaceState({}, "", `/editor.html?id=${id}`);
}

// =========================
// VIEW BUTTON
// =========================
function goView() {
  if (currentSlug) {
    location.href = "/" + currentSlug;
  }
}

load();
</script>

</body>
</html>
