<!-- FILE: public/index.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IndexMod</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fafafa;
  color: #111;
}

header {
  padding: 60px;
  font-size: 30px;
}

a {
  text-decoration: none;
  color: #111;
}

.grid {
  padding: 0 60px 80px;
}

.item {
  padding: 10px 0;
}
</style>
</head>

<body>

<header>IndexMod</header>

<div class="grid" id="grid"></div>

<script>
async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  const grid = document.getElementById("grid");

  grid.innerHTML = pages.map(p => `
    <div class="item">
      <a href="/view.html?id=${p.id}">
        ${p.title || p.id}
      </a>
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
