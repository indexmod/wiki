<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Editor</title>
</head>
<body>

<h1>Editor</h1>

<input id="slug" placeholder="slug" />
<input id="title" placeholder="title" />
<br><br>

<textarea id="content" style="width:100%;height:300px;"></textarea>

<br>

<button onclick="save()">Save</button>

<script>
const params = new URLSearchParams(location.search);
const editSlug = params.get("slug");

// =========================
// LOAD EXISTING PAGE
// =========================
async function load() {
  if (!editSlug) return;

  const res = await fetch("/api/page/" + editSlug);
  if (!res.ok) return;

  const data = await res.json();

  document.getElementById("slug").value = data.slug;
  document.getElementById("title").value = data.title;
  document.getElementById("content").value = data.content;
}

// =========================
// SAVE PAGE
// =========================
async function save() {
  const slug = document.getElementById("slug").value;
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  if (!slug) {
    alert("slug is required");
    return;
  }

  await fetch("/api/page/" + slug, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title,
      content
    })
  });

  alert("saved");
  location.href = "/view.html?slug=" + slug;
}

load();
</script>

</body>
</html>
