<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<title>Editor</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fafafa;
  color: #111;
}

header {
  padding: 80px 60px 40px 60px;
}

.logo {
  width: 80px;
  display: block;
  animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
  0%   { opacity: 1; transform: scale(1); }
  50%  { opacity: 0.4; transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}

main {
  padding: 0 60px 60px 60px;
  max-width: 900px;
}

input {
  width: 100%;
  border: none;
  outline: none;
  font-family: Georgia, serif;
  background: transparent;
}

#slug {
  font-size: 14px;
  color: #888;
  margin-bottom: 10px;
}

#title {
  font-size: 36px;
  margin-bottom: 30px;
}

textarea {
  width: 100%;
  height: 400px;
  border: none;
  outline: none;
  resize: none;
  font-family: Georgia, serif;
  font-size: 18px;
  line-height: 1.6;
  background: transparent;
}

.actions {
  margin-top: 40px;
}

button {
  border: none;
  background: none;
  font-family: Georgia, serif;
  font-size: 18px;
  cursor: pointer;
  color: #666;
}

button:hover {
  color: #000;
}
</style>

<script src="/slugify.js"></script>

</head>
<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo" />
  </a>
</header>

<main>

<input id="slug" placeholder="slug" />
<input id="title" placeholder="Title" />

<textarea id="content" placeholder="Start writing..."></textarea>

<div class="actions">
  <button onclick="save()">Save</button>
</div>

</main>

<script>
const params = new URLSearchParams(location.search);
const incomingSlug = params.get("slug");

const slugInput = document.getElementById("slug");
const titleInput = document.getElementById("title");
const contentInput = document.getElementById("content");

let locked = false;

// =========================
// INIT FROM TOPICS
// =========================
if (incomingSlug) {
  const clean = smartSlug(incomingSlug);

  slugInput.value = clean;
  slugInput.setAttribute("readonly", true); // 🔒 фиксируем slug

  // автотайтл
  titleInput.value = autoTitle(clean);

  locked = true;
}

// =========================
// AUTO SLUG (только если НЕ из topics)
// =========================
titleInput.addEventListener("input", (e) => {
  if (locked) return;

  const title = e.target.value;
  slugInput.value = smartSlug(title);
});

// =========================
// LOAD EXISTING
// =========================
async function load() {
  if (!incomingSlug) return;

  const slug = smartSlug(incomingSlug);

  const res = await fetch("/api/page/" + slug);
  if (!res.ok) return;

  const data = await res.json();

  slugInput.value = slug;
  titleInput.value = data.title || autoTitle(slug);
  contentInput.value = data.content || "";
}

// =========================
// SAVE
// =========================
async function save() {
  const slug = smartSlug(slugInput.value);
  let title = titleInput.value.trim();

  if (!title) {
    title = autoTitle(slug); // 🔥 защита от пустых / ошибок
    titleInput.value = title;
  }

  const content = contentInput.value;

  await fetch(`/api/page/${slug}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, content })
  });

  location.href = "/view.html?slug=" + slug;
}

load();
</script>

</body>
</html>
