name = "wiki"
main = "worker.js"
compatibility_date = "2026-04-25"

# =========================
# STATIC FRONTEND
# =========================
[assets]
directory = "./public"
binding = "ASSETS"

# ⚠️ ВАЖНО:
# НЕ перехватываем ВСЕ запросы Worker'ом без fallback логики
# иначе при любом crash = 1101
run_worker_first = []

# =========================
# ROUTING BEHAVIOR
# =========================
# оставляем стандартное поведение Cloudflare
not_found_handling = "none"

# =========================
# R2 STORAGE (PAGES DB)
# =========================
[[r2_buckets]]
binding = "PAGES"
bucket_name = "indexmod-pages"
