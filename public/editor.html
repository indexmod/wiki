<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editor</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<h1>Editor</h1>

<input id="title" placeholder="Title" />

<br><br>

<textarea id="content" placeholder="Write Markdown here..."></textarea>

<br><br>

<button id="save">Save</button>
<a id="back" href="/">Back</a>

<script type="module">
const slug = new URLSearchParams(location.search).get("slug");

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");
const saveBtn = document.getElementById("save");
const backBtn = document.getElementById("back");

// ----------------------
// LOAD EXISTING PAGE
// ----------------------
async function load() {
  if (!slug) return;

  const res = await fetch(`/api/page/${slug}`);

  if (!res.ok) return;

  const page = await res.json();

  titleEl.value = page.title || "";
  contentEl.value = page.content || "";
}

load();

// ----------------------
// SAVE PAGE
// ----------------------
saveBtn.onclick = async () => {
  const title = titleEl.value.trim();
  const content = contentEl.value;

  if (!title || !content) {
    alert("Title and content required");
    return;
  }

  const targetSlug = slug || title.toLowerCase().replace(/\s+/g, "-");

  await fetch(`/api/page/${targetSlug}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      title,
      content,
    }),
  });

  window.location.href = `/view.html?slug=${targetSlug}`;
};

// ----------------------
// BACK LINK
// ----------------------
backBtn.onclick = (e) => {
  e.preventDefault();
  window.location.href = "/";
};
</script>

</body>
</html>
