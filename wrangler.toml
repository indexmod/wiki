name = "wiki"
main = "worker.js"
compatibility_date = "2026-04-25"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*", "/*"]
not_found_handling = "single-page-application"

# =========================
# NEW: R2 FILE STORAGE
# =========================
[[r2_buckets]]
binding = "PAGES"
bucket_name = "indexmod-pages"
