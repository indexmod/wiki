<script src="/slugify.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(location.search);
  const rawSlug = params.get("slug");

  const slug = slugify(rawSlug || "");

  const titleEl = document.getElementById("title");
  const contentEl = document.getElementById("content");
  const editEl = document.getElementById("editLink");

  if (!titleEl || !contentEl || !editEl) {
    console.error("View: missing DOM nodes");
    return;
  }

  async function load() {
    if (!slug) {
      titleEl.textContent = "No slug";
      return;
    }

    try {
      const res = await fetch("/api/page/" + slug);

      // защита от HTML вместо JSON
      const contentType = res.headers.get("content-type") || "";
      if (!res.ok || !contentType.includes("application/json")) {
        titleEl.textContent = "Not found";
        contentEl.textContent = "";
        return;
      }

      const data = await res.json();

      // title
      titleEl.textContent = data.title || slug;

      // markdown render (safe fallback)
      if (window.marked && typeof marked.parse === "function") {
        contentEl.innerHTML = marked.parse(data.content || "");
      } else {
        contentEl.textContent = data.content || "";
      }

      // edit link
      editEl.href = "/editor.html?slug=" + slug;

    } catch (err) {
      console.error("View load error:", err);
      titleEl.textContent = "Error";
      contentEl.textContent = "";
    }
  }

  load();
});
</script>
