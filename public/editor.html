<!-- FILE: public/editor.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor</title>

<script src="/slugify.js"></script>

<style>
body { font-family: Georgia; margin:0; padding:60px; }
input, textarea { width:100%; font-size:18px; margin-bottom:20px; }
textarea { height:400px; }
.save { position:fixed; top:20px; right:20px; cursor:pointer; }
</style>
</head>

<body>

<div class="save" onclick="save()">SAVE</div>

<input id="title" placeholder="title">
<textarea id="content"></textarea>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id");

const title = document.getElementById("title");
const content = document.getElementById("content");

// LOAD
async function load() {
  if (!id) return;

  const res = await fetch("/api/page/" + id);
  const data = await res.json();

  title.value = data.title || "";
  content.value = data.content || "";
}

// SAVE
async function save() {
  if (!id) return;

  const res = await fetch("/api/page/" + id, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title: title.value,
      content: content.value
    })
  });

  const page = await res.json();

  // возвращаемся на slug view
  location.href = "/" + page.slug;
}

load();
</script>

</body>
</html>
