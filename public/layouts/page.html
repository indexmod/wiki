/* =========================================================
   PAGE LAYOUT
   ROLE: render a single page view
   INPUT:
   - {{title}}
   - {{content}} (HTML from markdown)
   OUTPUT:
   - semantic article block
   NOTES:
   - no <html>, no <body>
   ========================================================= */

<article class="page">
  <header class="page-header">
    <h1>{{title}}</h1>
  </header>

  <section class="page-content">
    {{content}}
  </section>
</article>
