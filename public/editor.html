<!-- FILE: public/editor.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  padding: 60px;
}

input, textarea {
  width: 100%;
  font-size: 18px;
  margin-bottom: 20px;
}

.meta {
  font-size: 13px;
  color: #666;
  margin-bottom: 20px;
  font-family: ui-monospace, monospace;
}

.topbar {
  position: fixed;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 20px;
  font-size: 14px;
}

a {
  color: #111;
  text-decoration: none;
}

#slugInput {
  width: 100%;
  font-size: 14px;
  padding: 6px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="topbar">
  <a href="/" id="viewLink">view</a>
</div>

<div class="meta">
  ID: <span id="idView">new</span><br>
  Permalink:
  <input id="slugInput" placeholder="slug">
</div>

<input id="title" placeholder="title">
<textarea id="content" placeholder="content"></textarea>

<button onclick="save()">Save</button>

<script>
const params = new URLSearchParams(location.search);
let id = params.get("id");

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");

const idView = document.getElementById("idView");
const slugInput = document.getElementById("slugInput");
const viewLink = document.getElementById("viewLink");

// =========================
// LOAD
// =========================
async function load() {
  if (!id) return;

  const res = await fetch("/api/page/" + id);
  if (!res.ok) return;

  const data = await res.json();

  titleEl.value = data.title || "";
  contentEl.value = data.content || "";

  idView.textContent = data.id;
  slugInput.value = data.slug || "";

  viewLink.href = "/view.html?id=" + data.id;
}

// =========================
// SAVE
// =========================
async function save() {
  let slug = slugInput.value.trim();

  // fallback safety
  if (!slug) {
    slug = titleEl.value
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-|-$/g, "");
  }

  const res = await fetch("/api/page/" + (id || "new"), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title: titleEl.value,
      content: contentEl.value,
      slug: slug   // 🔥 ключевая фикса
    })
  });

  const page = await res.json();

  id = page.id;

  idView.textContent = page.id;
  slugInput.value = page.slug;

  history.replaceState(null, "", "/editor.html?id=" + page.id);

  viewLink.href = "/view.html?id=" + page.id;
}

load();
</script>

</body>
</html>
