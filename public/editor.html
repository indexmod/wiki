<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<title>Editor</title>

<style>
/* =========================
   BASE
========================= */
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fafafa;
  color: #111;
}

/* =========================
   HEADER
========================= */
header {
  padding: 80px 60px 40px 60px;
}

.logo {
  width: 80px;
  display: block;
  animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
  0%   { opacity: 1; transform: scale(1); }
  50%  { opacity: 0.4; transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}

/* =========================
   MAIN
========================= */
main {
  padding: 0 60px 60px 60px;
  max-width: 900px;
}

/* =========================
   INPUTS
========================= */
input {
  width: 100%;
  border: none;
  outline: none;
  font-family: Georgia, serif;
  background: transparent;
}

#slug {
  font-size: 14px;
  color: #888;
  margin-bottom: 10px;
}

#title {
  font-size: 36px;
  margin-bottom: 30px;
}

/* =========================
   TEXTAREA
========================= */
textarea {
  width: 100%;
  height: 400px;
  border: none;
  outline: none;
  resize: none;
  font-family: Georgia, serif;
  font-size: 18px;
  line-height: 1.6;
  background: transparent;
}

/* =========================
   ACTIONS
========================= */
.actions {
  margin-top: 40px;
}

button {
  border: none;
  background: none;
  font-family: Georgia, serif;
  font-size: 18px;
  cursor: pointer;
  color: #666;
}

button:hover {
  color: #000;
}
</style>

<!-- ✅ slugify core -->
<script src="/slugify.js"></script>

</head>
<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo" />
  </a>
</header>

<main>

<input id="slug" placeholder="slug" />
<input id="title" placeholder="Title" />

<textarea id="content" placeholder="Start writing..."></textarea>

<div class="actions">
  <button onclick="save()">Save</button>
</div>

</main>

<script>
const params = new URLSearchParams(location.search);
const editSlug = params.get("slug");

// =========================
// AUTO SLUG FROM TITLE
// =========================
document.getElementById("title").addEventListener("input", (e) => {
  const title = e.target.value;
  const slug = smartSlug(title);   // 🔥 ВАЖНО

  document.getElementById("slug").value = slug;
});

// =========================
// LOAD EXISTING PAGE
// =========================
async function load() {
  if (!editSlug) return;

  const res = await fetch("/api/page/" + editSlug);
  if (!res.ok) return;

  const data = await res.json();

  document.getElementById("slug").value = data.slug;
  document.getElementById("title").value = data.title;
  document.getElementById("content").value = data.content;
}

// =========================
// SAVE PAGE
// =========================
async function save() {
  const slug = smartSlug(document.getElementById("slug").value); // 🔥 защита
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  if (!slug) {
    alert("slug is required");
    return;
  }

  await fetch(`/api/page/${slug}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, content })
  });

  location.href = "/view.html?slug=" + slug;
}

load();
</script>

</body>
</html>
