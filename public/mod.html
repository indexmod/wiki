<script>
let timeout;
let isSaving = false;

const editor = document.getElementById("editor");

// =========================
// LOAD
// =========================
async function load() {
  try {
    const res = await fetch("/api/topics");

    if (!res.ok) {
      console.error("LOAD ERROR", res.status);
      return;
    }

    const text = await res.text();
    editor.value = text;

  } catch (e) {
    console.error("LOAD FAIL", e);
  }
}

// =========================
// NORMALIZE
// =========================
function normalizeTopics(text) {
  const seen = new Set();

  return text
    .split("\n")
    .map(t => t.trim())
    .filter(Boolean)
    .filter(line => {
      const key = smartSlug(line);

      if (!key) return false;
      if (seen.has(key)) return false;

      seen.add(key);
      return true;
    })
    .join("\n");
}

// =========================
// SAVE
// =========================
async function save(value) {
  if (isSaving) return;
  isSaving = true;

  const cleaned = normalizeTopics(value);

  // ❌ защита от полного удаления
  if (!cleaned.trim()) {
    console.warn("EMPTY BLOCKED");
    isSaving = false;
    return;
  }

  try {
    const res = await fetch("/api/topics", {
      method: "POST",
      headers: {
        "Content-Type": "text/plain"
      },
      body: cleaned
    });

    if (!res.ok) {
      console.error("SAVE ERROR", res.status);
      isSaving = false;
      return;
    }

    // ✔ обновляем только если отличается
    if (editor.value !== cleaned) {
      const cursor = editor.selectionStart;
      editor.value = cleaned;
      editor.setSelectionRange(cursor, cursor);
    }

    console.log("saved");

  } catch (e) {
    console.error("SAVE FAIL", e);
  }

  isSaving = false;
}

// =========================
// FORCE SAVE
// =========================
function forceSave() {
  save(editor.value);
}

// =========================
// AUTOSAVE
// =========================
editor.addEventListener("input", () => {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    save(editor.value);
  }, 600); // чуть мягче
});

load();
</script>
