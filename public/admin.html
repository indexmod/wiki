<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
  margin: 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
  background: white;
  color: #111;
  font-size: 20px;
}

header {
  padding: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  width: 70px;
  animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

main {
  padding: 0 60px 80px 60px;
  max-width: 900px;
}

/* item */
.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 0;
}

/* link */
.item a {
  text-decoration: none;
  color: #111;
}

/* checkbox */
input[type="checkbox"] {
  transform: scale(1.3);
  margin-right: 20px;
}

/* delete */
.actions {
  position: fixed;
  top: 60px;
  right: 60px;
  cursor: pointer;
}
</style>

<!-- 🔥 slugify core -->
<script src="/slugify.js"></script>

</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo" />
  </a>
</header>

<div class="actions" onclick="bulkDelete()">
  delete
</div>

<main>
  <div id="list"></div>
</main>

<script>
let pages = [];

// =========================
// LOAD
// =========================
async function load() {
  const res = await fetch("/api/pages");
  pages = await res.json();

  const list = document.getElementById("list");

  list.innerHTML = pages.map(p => {
    const slug = slugify(p.slug); // 🔥 защита от мусора

    return `
      <div class="item">
        <div>
          <input type="checkbox" value="${slug}">
          <a href="/view.html?slug=${slug}">
            ${p.title || p.slug}
          </a>
        </div>
      </div>
    `;
  }).join("");
}

// =========================
// BULK DELETE
// =========================
async function bulkDelete() {
  const checked = [...document.querySelectorAll("input[type=checkbox]:checked")]
    .map(i => slugify(i.value)); // 🔥 нормализация

  if (!checked.length) return;

  if (!confirm("Delete selected pages?")) return;

  for (const slug of checked) {
    await fetch("/api/page/" + slug, { method: "DELETE" });
  }

  load();
}

load();
</script>

</body>
</html>
