<!-- FILE: public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndexMod</title>

<link rel="icon" href="/favicon.svg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  font-size: 25px;
  color: #000;
}

header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { height: 40px; }

a { text-decoration: none; color: #000; }

main {
  padding: 120px 60px;
  max-width: 900px;
  margin: 0 auto;
}

.item { margin-bottom: 12px; }

.slug {
  font-size: 14px;
  opacity: 0.4;
  margin-left: 8px;
}

.empty {
  opacity: 0.4;
  font-style: italic;
}
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <!-- 🔥 теперь можно создать сразу страницу -->
  <a href="/editor.html">+ new</a>
</header>

<main id="list"></main>

<script>
async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  const list = document.getElementById("list");

  if (!pages.length) {
    list.innerHTML = `<div class="empty">no pages yet</div>`;
    return;
  }

  list.innerHTML = pages
    .sort((a,b) => (a.title||"").localeCompare(b.title||""))
    .map(p => `
      <div class="item">
        <a href="/${p.slug}">${escapeHtml(p.title || p.slug)}</a>

        <span class="slug">/${escapeHtml(p.slug || "")}</span>

        <!-- 🔥 быстрый edit -->
        <a href="/editor.html?slug=${p.slug}" style="margin-left:10px;font-size:14px;opacity:0.5;">
          edit
        </a>
      </div>
    `)
    .join("");
}

function escapeHtml(s="") {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

load();
</script>

</body>
</html>
