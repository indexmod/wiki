<!-- FILE: public/view.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>View</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  padding: 60px;
}

h1 {
  font-size: 40px;
}

.edit {
  position: fixed;
  top: 20px;
  right: 20px;
}
</style>
</head>

<body>

<a class="edit" id="edit">Edit</a>

<h1 id="title"></h1>
<div id="content"></div>

<script>
const id = new URLSearchParams(location.search).get("id");

async function load() {
  const res = await fetch("/api/page/" + id);
  const data = await res.json();

  document.getElementById("title").innerText = data.title;
  document.getElementById("content").innerText = data.content;

  document.getElementById("edit").href = "/editor.html?id=" + id;
}

load();
</script>

</body>
</html>
