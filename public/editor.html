<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  font-size: 22px;
}
header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
}
main {
  padding: 120px 60px;
  max-width: 900px;
  margin: auto;
}
input, textarea {
  width: 100%;
  font-size: 22px;
  border: none;
  outline: none;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" style="height:40px;">
  </a>

  <a onclick="save()">save</a>
</header>

<main>
  <input id="title" placeholder="title">
  <textarea id="content" placeholder="content"></textarea>
</main>

<script>
let slug = new URLSearchParams(location.search).get("slug");

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");

// ================= LOAD =================
async function load() {
  if (!slug) return;

  const res = await fetch("/api/page/" + slug);
  if (!res.ok) return;

  const p = await res.json();

  titleEl.value = p.title || "";
  contentEl.value = p.content || "";
}

// ================= SAVE =================
async function save() {
  const base = slug || titleEl.value || "page";

  const res = await fetch("/api/page/" + base, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      title: titleEl.value,
      content: contentEl.value
    })
  });

  const p = await res.json();

  // 👉 обновляем slug если это новая страница
  slug = p.slug;

  // 👉 сразу в просмотр
  location.href = "/" + p.slug;
}

load();
</script>

</body>
</html>
