// FILE: public/editor.html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editor</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  font-size: 25px;
  color: #000;
}

header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  height: 40px;
}

.controls {
  display: flex;
  gap: 20px;
}

a {
  text-decoration: none;
  color: #000;
  cursor: pointer;
}

main {
  padding: 120px 60px;
  max-width: 900px;
  margin: 0 auto;
}

input, textarea {
  width: 100%;
  font-family: Georgia, serif;
  font-size: 25px;
  border: none;
  outline: none;
  margin-bottom: 20px;
}

#slugInput {
  opacity: 0.7;
}
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <div class="controls">
    <a id="viewLink" target="_blank">view</a>
    <a onclick="save()">save</a>
  </div>
</header>

<main>
  <input id="title" placeholder="title">
  <input id="slugInput" placeholder="permalink">
  <textarea id="content" placeholder="content"></textarea>
</main>

<script>
// =========================
// ROUTING (ZERO-ID MODEL)
// /romashka?edit=1
// /new?edit=1
// =========================
const url = new URL(location.href);

let slug = window.location.pathname.slice(1);
let isNew = slug === "new";
let isEdit = url.searchParams.get("edit") === "1";

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");
const slugEl = document.getElementById("slugInput");
const viewLink = document.getElementById("viewLink");

// internal id (never shown)
let id = null;

// =========================
// LOAD
// =========================
async function load() {
  if (!slug) return;

  const res = await fetch("/api/page/" + slug);
  if (!res.ok && !isNew) return;

  if (isNew) {
    viewLink.href = "/";
    return;
  }

  const page = await res.json();

  id = page.id;

  titleEl.value = page.title || "";
  contentEl.value = page.content || "";
  slugEl.value = page.slug || "";

  viewLink.href = "/" + page.slug;

  if (!isEdit) {
    titleEl.disabled = true;
    contentEl.disabled = true;
    slugEl.disabled = true;
  }
}

// =========================
// SAVE
// =========================
async function save() {
  const finalSlug = normalizeSlug(
    slugEl.value || titleEl.value || "page"
  );

  const res = await fetch("/api/page/" + (id || "new"), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title: titleEl.value,
      content: contentEl.value,
      slug: finalSlug
    })
  });

  const page = await res.json();

  id = page.id;

  slugEl.value = page.slug;

  // redirect to clean canonical URL
  history.replaceState(null, "", "/" + page.slug + "?edit=1");

  viewLink.href = "/" + page.slug;
}

// =========================
// SLUG NORMALIZER
// =========================
function normalizeSlug(input) {
  return String(input || "")
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-|-$/g, "");
}

load();
</script>

</body>
</html>
