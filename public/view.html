<script src="/slugify.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(location.search);
  const slug = slugify(params.get("slug") || "");

  const titleEl = document.getElementById("title");
  const contentEl = document.getElementById("content");
  const editEl = document.getElementById("editLink");

  // =========================
  // SAFETY CHECK (ВАЖНО)
  // =========================
  if (!titleEl || !contentEl || !editEl) {
    console.error("View error: missing DOM nodes", {
      titleEl,
      contentEl,
      editEl
    });
    return;
  }

  async function load() {
    if (!slug) {
      titleEl.textContent = "No slug";
      return;
    }

    try {
      const res = await fetch("/api/page/" + slug);

      if (!res.ok) {
        titleEl.textContent = "Not found";
        contentEl.textContent = "";
        return;
      }

      const data = await res.json();

      // title
      titleEl.textContent = data.title || slug;

      // markdown
      const html = window.marked
        ? marked.parse(data.content || "")
        : (data.content || "");

      contentEl.innerHTML = html;

      // edit link
      editEl.href = "/editor.html?slug=" + slug;

    } catch (e) {
      console.error("View load error:", e);
      titleEl.textContent = "Error";
      contentEl.textContent = "";
    }
  }

  load();
});
</script>
