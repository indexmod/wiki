<!-- FILE: public/editor.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  font-size: 25px;
  color: #000;
}

/* HEADER */
header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  height: 40px;
}

.controls {
  display: flex;
  gap: 20px;
}

a {
  text-decoration: none;
  color: #000;
  cursor: pointer;
}

/* CONTENT */
main {
  padding: 120px 60px;
  max-width: 900px;
  margin: 0 auto;
}

input, textarea {
  width: 100%;
  font-family: Georgia, serif;
  font-size: 25px;
  border: none;
  outline: none;
  margin-bottom: 20px;
}

/* slug строка */
#slugInput {
  font-size: 25px;
}
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <div class="controls">
    <a id="viewLink">view</a>
    <a onclick="save()">save</a>
  </div>
</header>

<main>
  <input id="title" placeholder="title">
  <input id="slugInput" placeholder="permalink">
  <textarea id="content" placeholder="content"></textarea>
</main>

<script>
const params = new URLSearchParams(location.search);
let id = params.get("id");

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");
const slugInput = document.getElementById("slugInput");
const viewLink = document.getElementById("viewLink");

// =========================
// LOAD
// =========================
async function load() {
  if (!id) return;

  const res = await fetch("/api/page/" + id);
  if (!res.ok) return;

  const data = await res.json();

  titleEl.value = data.title || "";
  contentEl.value = data.content || "";
  slugInput.value = data.slug || "";

  viewLink.href = "/" + data.slug;
}

// =========================
// SAVE
// =========================
async function save() {
  let slug = slugInput.value.trim();

  if (!slug) {
    slug = titleEl.value
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-|-$/g, "");
  }

  const res = await fetch("/api/page/" + (id || "new"), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title: titleEl.value,
      content: contentEl.value,
      slug: slug
    })
  });

  const page = await res.json();

  id = page.id;

  slugInput.value = page.slug;

  // фиксируем ID в URL редактора
  history.replaceState(null, "", "/editor.html?id=" + page.id);

  // обновляем view ссылку (чистый slug)
  viewLink.href = "/" + page.slug;
}

load();
</script>

</body>
</html>
