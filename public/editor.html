<!-- FILE: public/editor.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editor</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  font-size: 25px;
}

header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
}

main {
  padding: 120px 60px;
  max-width: 900px;
  margin: 0 auto;
}

input, textarea {
  width: 100%;
  font-size: 25px;
  border: none;
  outline: none;
  margin-bottom: 20px;
}

/* SAVE ONLY */
.save {
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" style="height:40px;">
  </a>

  <div class="save" onclick="save()">save</div>
</header>

<main>
  <input id="title" placeholder="title">
  <input id="slug" placeholder="slug">
  <textarea id="content" placeholder="content"></textarea>
</main>

<script>
let slug = new URLSearchParams(location.search).get("slug") || "";

const titleEl = document.getElementById("title");
const slugEl = document.getElementById("slug");
const contentEl = document.getElementById("content");

// =========================
// LOAD
// =========================
async function load() {
  if (!slug) return;

  const res = await fetch("/api/page/" + slug);
  if (!res.ok) return;

  const p = await res.json();

  titleEl.value = p.title || "";
  slugEl.value = p.slug || "";
  contentEl.value = p.content || "";
}

// =========================
// SAVE → GO TO PAGE
// =========================
async function save() {
  const newSlug = normalize(slugEl.value || titleEl.value);

  const res = await fetch("/api/page/" + newSlug, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      title: titleEl.value,
      content: contentEl.value,
      slug: newSlug
    })
  });

  const p = await res.json();

  // 🔥 главный момент UX
  window.location.href = "/" + p.slug;
}

// =========================
function normalize(s){
  return String(s||"")
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/^-|-$/g,"");
}

load();
</script>

</body>
</html>
