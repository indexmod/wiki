<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndexMod Fashion and Art</title>

<link rel="icon" href="/favicon.svg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fff;
  color: #000;
}

/* HEADER */
header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  height: 40px;
}

a {
  color: #000;
  text-decoration: none;
}

/* GRID */
main {
  padding: 140px 60px 60px;
  max-width: 1200px;
  margin: 0 auto;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
}

/* ITEM */
.item {
  break-inside: avoid;
  margin-bottom: 30px;
}

/* TITLE */
.title {
  font-size: 26px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* SUBTEXT (future markdown preview hook) */
.preview {
  font-size: 14px;
  opacity: 0.6;
  margin-top: 8px;
  line-height: 1.4;
}

/* DIVIDER */
.item::after {
  content: "";
  display: block;
  width: 20px;
  height: 1px;
  background: #000;
  margin-top: 10px;
  opacity: 0.15;
}

.empty {
  grid-column: 1 / -1;
  opacity: 0.4;
  font-style: italic;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  main {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <a href="/editor.html">+ new</a>
</header>

<main id="list"></main>

<script>
async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  const list = document.getElementById("list");

  const safe = (pages || [])
    .filter(p => p && (p.slug || p.title));

  if (!safe.length) {
    list.innerHTML = `<div class="empty">no pages yet</div>`;
    return;
  }

  list.innerHTML = safe
    .sort((a,b) =>
      (a.title || a.slug).localeCompare(b.title || b.slug)
    )
    .map(renderItem)
    .join("");
}

/* =========================
   ITEM RENDER (CLEAN CORE)
========================= */
function renderItem(p) {
  const title = safeText(p.title || p.slug);
  const slug = safeText(p.slug || "");

  return `
    <div class="item">
      <a href="/${slug}">
        <div class="title">${title.toUpperCase()}</div>
      </a>

      <!-- markdown preview hook (future) -->
      <div class="preview" data-slug="${slug}"></div>
    </div>
  `;
}

/* =========================
   SAFE TEXT
========================= */
function safeText(s="") {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

load();
</script>

</body>
</html>
