<!-- FILE: public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndexMod</title>

<link rel="icon" href="/favicon.svg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  font-size: 25px;
  color: #000;
}

/* HEADER */
header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  height: 40px;
}

.add {
  text-decoration: none;
  color: #000;
}

/* LIST */
main {
  padding: 120px 60px;
  max-width: 900px;
  margin: 0 auto;
}

.item {
  margin-bottom: 10px;
}

.item a {
  text-decoration: none;
  color: #000;
}
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <a class="add" href="/editor.html">New page</a>
</header>

<main id="list"></main>

<script>
async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  const list = document.getElementById("list");

  list.innerHTML = pages
    .sort((a,b) => (a.title||"").localeCompare(b.title||""))
    .map(p => {
      return `
        <div class="item">
          <a href="/${p.slug}">
            ${escapeHtml(p.title || p.slug)}
          </a>
        </div>
      `;
    })
    .join("");
}

function escapeHtml(str="") {
  return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

load();
</script>

</body>
</html>
