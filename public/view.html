<!-- FILE: view.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View</title>

<link rel="icon" href="/favicon.svg">

<script src="/slugify.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fafafa;
  color: #111;
}

/* =========================
   LOGO (top-left safe area)
========================= */
header {
  position: fixed;
  top: 0;
  left: 0;
  padding: 20px;
  z-index: 10;
}

header img {
  width: 70px;
  opacity: 0.9;
}

/* =========================
   EDIT LINK (TOP LEFT)
========================= */
#editLink {
  position: fixed;
  top: 30px;
  left: 110px;
  font-size: 14px;
  color: #777;
  text-decoration: none;
  letter-spacing: 1px;
}

#editLink:hover {
  color: #000;
}

/* =========================
   CONTENT LAYOUT
========================= */
main {
  padding: 140px 60px 80px;
  max-width: 900px;
  margin: 0 auto;
}

.title {
  font-size: 42px;
  margin-bottom: 20px;
}

.content {
  font-size: 20px;
  line-height: 1.6;
}

/* markdown safety */
.content img {
  max-width: 100%;
}
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png">
  </a>
</header>

<!-- 🔥 EDIT FIXED TOP-LEFT -->
<a id="editLink">Edit</a>

<main>
  <div id="title" class="title"></div>
  <div id="content" class="content"></div>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(location.search);
  const slug = slugify(params.get("slug") || "");

  const titleEl = document.getElementById("title");
  const contentEl = document.getElementById("content");
  const editEl = document.getElementById("editLink");

  if (!titleEl || !contentEl || !editEl) {
    console.error("VIEW ERROR: missing DOM nodes");
    return;
  }

  async function load() {
    if (!slug) {
      titleEl.textContent = "No slug";
      return;
    }

    try {
      const res = await fetch("/api/page/" + slug);

      if (!res.ok) {
        titleEl.textContent = "Not found";
        contentEl.textContent = "";
        return;
      }

      const data = await res.json();

      titleEl.textContent = data.title || slug;

      // markdown render (safe fallback)
      contentEl.innerHTML = window.marked
        ? marked.parse(data.content || "")
        : (data.content || "");

      editEl.href = "/editor.html?slug=" + slug;

    } catch (e) {
      console.error("VIEW LOAD ERROR:", e);
      titleEl.textContent = "Error";
    }
  }

  load();
});
</script>

</body>
</html>
