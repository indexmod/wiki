<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndexMod Fashion and Art</title>

<link rel="icon" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.svg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fff;
  color: #000;
}

/* HEADER */
header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { height: 40px; }

a {
  color: #000;
  text-decoration: none;
}

/* NEW BUTTON */
.new {
  font-size: 28px;
}

/* GRID */
main {
  padding: 140px 60px 60px;
  max-width: 1200px;
  margin: 0 auto;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 60px;
}

/* SECTION */
.section {
  margin-bottom: 40px;
}

.section-title {
  font-size: 40px;
  letter-spacing: 0.3em;
  margin-bottom: 20px;
  opacity: 0.4;
}

/* ITEM */
.item {
  margin-bottom: 18px;
}

/* TITLE */
.title {
  font-size: 25px;
  letter-spacing: 0.05em;
  color: #000; /* 🔥 ЖЁСТКО ЧЁРНЫЙ */
}

/* EMPTY */
.empty {
  grid-column: 1 / -1;
  opacity: 0.4;
  font-style: italic;
}

/* MOBILE */
@media (max-width: 900px) {
  main {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <a class="new" href="/editor.html">+ new</a>
</header>

<main id="list"></main>

<script>
function cleanTitle(p) {
  let t = (p.title || "").trim();

  // если title пустой → аккуратно из slug
  if (!t) {
    t = (p.slug || "")
      .replace(/-/g, " ")
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  return t;
}

function sectionLetter(title="") {
  const c = (title.trim()[0] || "#").toUpperCase();
  if (c >= "A" && c <= "Z") return c;
  return "#";
}

async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  const list = document.getElementById("list");

  const safe = (pages || [])
    .filter(p => p && p.slug);

  if (!safe.length) {
    list.innerHTML = `<div class="empty">no pages yet</div>`;
    return;
  }

  const groups = {};

  for (const p of safe) {
    const title = cleanTitle(p);
    const letter = sectionLetter(title);

    if (!groups[letter]) groups[letter] = [];
    groups[letter].push({ ...p, title });
  }

  const letters = Object.keys(groups).sort();

  list.innerHTML = letters.map(letter => {
    const items = groups[letter]
      .sort((a,b) => a.title.localeCompare(b.title));

    return `
      <div class="section">
        <div class="section-title">${letter}</div>

        ${items.map(p => `
          <div class="item">
            <a href="/${p.slug}">
              <div class="title">${escapeHtml(p.title)}</div>
            </a>
          </div>
        `).join("")}

      </div>
    `;
  }).join("");
}

function escapeHtml(s="") {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

load();
</script>

</body>
</html>
