<!-- FILE: admin.html -->

<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
  margin: 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
  background: white;
  color: #111;
  font-size: 20px;
}

header {
  padding: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  width: 70px;
  animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

main {
  padding: 0 60px 80px;
  max-width: 900px;
}

.item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
}

.item a {
  text-decoration: none;
  color: #111;
}

input[type="checkbox"] {
  transform: scale(1.3);
  margin-right: 16px;
}

.actions {
  position: fixed;
  top: 60px;
  right: 60px;
  cursor: pointer;
  font-weight: bold;
}
</style>

<script src="/slugify.js"></script>

</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo" />
  </a>
</header>

<div class="actions" onclick="bulkDelete()">
  delete
</div>

<main>
  <div id="list"></div>
</main>

<script>
let pages = [];

// =========================
// LOAD
// =========================
async function load() {
  const res = await fetch("/api/pages");
  const data = await res.json();

  pages = Array.isArray(data) ? data : [];

  const list = document.getElementById("list");

  list.innerHTML = pages
    .filter(p => p && p.slug)
    .map(p => {
      const slug = p.slug; // ⚠️ ВАЖНО: НЕ нормализуем обратно

      return `
        <div class="item">
          <div>
            <input type="checkbox" value="${slug}">
            <a href="/view.html?slug=${slug}">
              ${p.title || slug}
            </a>
          </div>
        </div>
      `;
    })
    .join("");
}

// =========================
// BULK DELETE
// =========================
async function bulkDelete() {
  const checked = [...document.querySelectorAll("input[type=checkbox]:checked")]
    .map(i => i.value)
    .filter(Boolean);

  if (!checked.length) return;

  if (!confirm("Delete selected pages?")) return;

  await Promise.all(
    checked.map(slug =>
      fetch("/api/page/" + slug, { method: "DELETE" })
    )
  );

  load();
}

load();
</script>

</body>
</html>
