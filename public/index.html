<!-- FILE: public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Index</title>

<link rel="icon" href="/favicon.svg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fafafa;
  color: #111;
}

header {
  padding: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  width: 70px;
  opacity: 0.9;
}

main {
  padding: 0 60px 80px;
  max-width: 900px;
}

.group {
  margin-bottom: 40px;
}

.letter {
  font-size: 14px;
  color: #999;
  margin-bottom: 10px;
}

.item {
  padding: 6px 0;
}

a {
  text-decoration: none;
  color: #111;
}

a:hover {
  text-decoration: underline;
}
</style>

</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>
</header>

<main>
  <div id="grid"></div>
</main>

<script>
async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  const grid = document.getElementById("grid");

  const items = pages.map(p => ({
    id: p.id,
    slug: p.slug,
    title: p.title || p.slug,
    letter: (p.title?.[0] || "#").toUpperCase()
  }));

  items.sort((a, b) =>
    (a.title || "").toLowerCase().localeCompare((b.title || "").toLowerCase())
  );

  const groups = {};

  for (const p of items) {
    const l = p.letter;
    if (!groups[l]) groups[l] = [];
    groups[l].push(p);
  }

  grid.innerHTML = Object.keys(groups).sort().map(letter => `
    <div class="group">
      <div class="letter">${letter}</div>
      ${groups[letter].map(p => `
        <div class="item">
          <a href="/${p.slug}">
            ${escapeHtml(p.title)}
          </a>
        </div>
      `).join("")}
    </div>
  `).join("");
}

function escapeHtml(str = "") {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

load();
</script>

</body>
</html>
