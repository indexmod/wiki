<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>IndexMod</title>

<link rel="icon" href="/favicon.svg">
<link rel="stylesheet" href="/styles.css">
</head>

<body class="layout-index">

<header>
  <a href="/" class="logo-wrap">
    <img src="/logo.png" class="logo">
  </a>

  <a class="new" href="/editor.html">New</a>
</header>

<main id="list"></main>

<script>
function cleanTitle(p) {
  let t = (p.title || "").trim();
  if (!t) {
    t = (p.slug || "")
      .replace(/-/g, " ")
      .replace(/\b\w/g, c => c.toUpperCase());
  }
  return t;
}

function sectionLetter(title="") {
  const c = (title.trim()[0] || "#").toUpperCase();
  return (c >= "A" && c <= "Z") ? c : "#";
}

async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  const list = document.getElementById("list");
  const safe = pages.filter(p => p?.slug);

  if (!safe.length) {
    list.innerHTML = "<div class='empty'>no pages</div>";
    return;
  }

  const groups = {};

  for (const p of safe) {
    const title = cleanTitle(p);
    const letter = sectionLetter(title);
    (groups[letter] ||= []).push({...p, title});
  }

  list.innerHTML = Object.keys(groups).sort().map(letter => {
    const items = groups[letter].sort((a,b)=>a.title.localeCompare(b.title));

    return `
      <div class="section">
        <div class="section-title">${letter}</div>

        ${items.map(p => `
          <div class="item">
            <a href="/${p.slug}">
              <div class="title">${p.title}</div>
            </a>
          </div>
        `).join("")}
      </div>
    `;
  }).join("");
}

load();
</script>

</body>
</html>
