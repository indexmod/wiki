<!-- FILE: public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndexMod</title>

<link rel="icon" href="/favicon.svg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  font-size: 25px;
  color: #000;
}

header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { height: 40px; }

main {
  padding: 120px 60px;
  max-width: 900px;
  margin: 0 auto;
}

.item { margin-bottom: 12px; }

.item a {
  text-decoration: none;
  color: #000;
}

.item a:hover { text-decoration: underline; }
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <a href="/editor.html" class="add">New page</a>
</header>

<main id="list"></main>

<script>
async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  document.getElementById("list").innerHTML =
    pages
      .filter(p => p && p.slug)
      .sort((a,b) => (a.title||"").localeCompare(b.title||""))
      .map(p => `
        <div class="item">
          <a href="/${p.slug}">
            ${escapeHtml(p.title || p.slug)}
          </a>
        </div>
      `)
      .join("");
}

function escapeHtml(str="") {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

load();
</script>

</body>
</html>
