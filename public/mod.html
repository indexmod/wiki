<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indexmod — Topics</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: white;
  color: black;
}

header {
  padding: 40px 60px 10px;
}

h1 {
  font-size: 22px;
  margin: 0 0 10px 0;
}

.note {
  font-size: 14px;
  line-height: 1.6;
  max-width: 720px;
}

main {
  padding: 40px 60px;
}

textarea {
  width: 100%;
  height: 420px;
  font-family: monospace;
  font-size: 14px;
  line-height: 1.5;
  border: none;
  outline: none;
  resize: vertical;
  background: transparent;
  color: black;
}

/* status subtle */
.status {
  margin-top: 10px;
  font-size: 13px;
  color: #000;
  opacity: 0.5;
}
</style>
</head>

<body>

<header>
  <h1>Topics</h1>

  <div class="note">
    Формат строки:<br><br>

    <code>slug | mode</code><br><br>

    Пример:<br>
    <code>art | core</code><br>
    <code>fashion | core</code><br>
    <code>void-aesthetics | speculative</code><br><br>

    — одна строка = одна тема<br>
    — слева slug (URL идентификатор)<br>
    — справа режим (пока не используется в index)<br>
    — пустые строки игнорируются системой
  </div>
</header>

<main>
  <textarea id="editor"></textarea>
  <div class="status" id="status"></div>
</main>

<script>
let timeout;

// загрузка
async function load() {
  const res = await fetch("/topics.txt");
  const text = await res.text();
  document.getElementById("editor").value = text;
}

// автосохранение (debounce)
async function save(value) {
  const res = await fetch("/api/topics", {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: value
  });

  const status = document.getElementById("status");
  status.textContent = res.ok ? "saved" : "error";

  setTimeout(() => status.textContent = "", 1500);
}

// live edit
document.addEventListener("input", (e) => {
  if (e.target.id !== "editor") return;

  clearTimeout(timeout);

  timeout = setTimeout(() => {
    save(e.target.value);
  }, 500);
});

load();
</script>

</body>
</html>
