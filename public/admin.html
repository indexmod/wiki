<!-- FILE: admin.html -->

<script src="/slugify.js"></script>

<script>
let pages = [];

// =========================
// LOAD (ID-FIRST)
// =========================
async function load() {
  const res = await fetch("/api/pages");
  const data = await res.json();

  pages = Array.isArray(data) ? data : [];

  const list = document.getElementById("list");

  list.innerHTML = pages
    .filter(p => p && p.id)
    .map(p => {
      return `
        <div class="item">
          <div>
            <input type="checkbox" value="${p.id}">

            <a href="/view.html?slug=${p.slug}">
              ${p.title || p.slug}
            </a>

            <small style="color:#aaa;margin-left:10px;">
              (${p.slug})
            </small>
          </div>

          <a href="/editor.html?id=${p.id}" style="font-size:14px;">
            edit
          </a>
        </div>
      `;
    })
    .join("");
}

// =========================
// BULK DELETE (BY ID)
// =========================
async function bulkDelete() {
  const checked = [...document.querySelectorAll("input[type=checkbox]:checked")]
    .map(i => i.value)
    .filter(Boolean);

  if (!checked.length) return;

  if (!confirm("Delete selected pages?")) return;

  await Promise.all(
    checked.map(id =>
      fetch("/api/page/" + id, { method: "DELETE" })
    )
  );

  load();
}

load();
</script>
