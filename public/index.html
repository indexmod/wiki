<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<title>Indexmod Fashion and Art</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fafafa;
  color: #111;
}

header {
  padding: 60px;
  position: relative;
}

.logo {
  width: 80px;
  display: block;
  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  0%   { opacity: 1; transform: scale(1); }
  50%  { opacity: 0.4; transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}

/* NEW PAGE */
.new {
  position: absolute;
  top: 60px;
  right: 60px;
  font-size: 18px;
}

.new a {
  text-decoration: none;
  color: #666;
}

.new a:hover {
  color: #000;
}

/* MAIN */
main {
  padding: 60px;
}

/* GRID 3 COL */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* LETTER */
.letter {
  margin-bottom: 20px;
  font-size: 40px;
  color: black;
}

/* PAGE */
.page {
  margin-bottom: 14px;
  font-size: 20px;
}

.page a {
  text-decoration: none;
  color: black;
}

/* MISSING */
.page a.missing {
  color: #222;
  border-bottom: 1px dashed #222;
}

/* HOVER */
.page a:hover {
  opacity: 0.5;
}

/* DROP CAP */
.page a::first-letter {
  font-size: 30px;
}
</style>
</head>

<body>

<header>
  <img src="/logo.png" class="logo" />

  <div class="new">
    <a href="/editor.html">+ New page</a>
  </div>
</header>

<main>
  <div id="grid" class="grid"></div>
</main>

<script>
async function load() {
  const [pagesRes, topicsRes] = await Promise.all([
    fetch("/api/pages"),
    fetch("/topics.txt")
  ]);

  const pages = await pagesRes.json();
  const topicsText = await topicsRes.text();

  const grid = document.getElementById("grid");

  // существующие
  const existing = {};
  pages.forEach(p => existing[p.slug] = p);

  // темы
  const topics = topicsText
    .split("\n")
    .map(t => t.trim())
    .filter(Boolean);

  // объединение
  const all = topics.map(slug => ({
    slug,
    title: existing[slug]?.title || slug,
    exists: !!existing[slug]
  }));

  // сортировка
  all.sort((a, b) =>
    a.title.toLowerCase().localeCompare(b.title.toLowerCase())
  );

  // группировка
  const groups = {};
  all.forEach(p => {
    const letter = p.title[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(p);
  });

  // рендер в 3 колонки
  grid.innerHTML = Object.keys(groups).sort().map(letter => `
    <div>
      <div class="letter">${letter}</div>

      ${groups[letter].map(p => `
        <div class="page">
          ${
            p.exists
              ? `<a href="/view.html?slug=${p.slug}">${p.title}</a>`
              : `<a class="missing" href="/editor.html?slug=${p.slug}">${p.title}</a>`
          }
        </div>
      `).join("")}
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
