<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editor · IndexMod</title>

<link rel="icon" href="/favicon.svg">
<link rel="stylesheet" href="/styles.css">
</head>

<body class="layout-editor">

<header>
  <a href="/" class="logo-wrap">
    <img src="/logo.png" class="logo">
  </a>

  <div class="actions">
    <a onclick="save()">save</a>
  </div>
</header>

<main class="editor">

  <input id="title" placeholder="title" />

  <textarea id="content" placeholder="write markdown..."></textarea>

</main>

<script>
let slug = new URLSearchParams(location.search).get("slug");

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");

// ================= LOAD =================
async function load() {
  if (!slug) return;

  const res = await fetch("/api/page/" + slug);
  if (!res.ok) return;

  const p = await res.json();

  titleEl.value = p.title || "";
  contentEl.value = p.content || "";
}

// ================= SAVE =================
async function save() {
  const base = slug || titleEl.value || "page";

  const res = await fetch("/api/page/" + base, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: titleEl.value,
      content: contentEl.value,
      slug: slug
    })
  });

  const p = await res.json();

  slug = p.slug;
  location.href = "/" + p.slug;
}

load();
</script>

</body>
</html>
