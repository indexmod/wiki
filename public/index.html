<!-- FILE: public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndexMod</title>

<link rel="icon" href="/favicon.svg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  font-size: 25px;
  color: #000;
}

header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  height: 40px;
}

.add {
  text-decoration: none;
  color: #000;
}

main {
  padding: 120px 60px;
  max-width: 900px;
  margin: 0 auto;
}

.item {
  margin-bottom: 12px;
}

.item a {
  text-decoration: none;
  color: #000;
}

.item a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<header>
  <!-- LOGO всегда ведёт в индекс -->
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <!-- создание новой страницы -->
  <a class="add" href="/editor.html">New page</a>
</header>

<main id="list"></main>

<script>
async function load() {
  try {
    const res = await fetch("/api/pages");
    const pages = await res.json();

    const list = document.getElementById("list");

    const safePages = (pages || []).filter(p => p && p.slug);

    list.innerHTML = safePages
      .sort((a, b) => (a.title || "").localeCompare(b.title || ""))
      .map(p => `
        <div class="item">
          <a href="/${p.slug}">
            ${escapeHtml(p.title || p.slug)}
          </a>
        </div>
      `)
      .join("");

  } catch (err) {
    console.error("Index load error:", err);
  }
}

function escapeHtml(str = "") {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

load();
</script>

</body>
</html>
