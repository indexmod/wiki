<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indexmod</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fafafa;
  color: #111;
}

main {
  padding: 60px;
  max-width: 900px;
}

/* LETTER */
.letter {
  margin-top: 60px;
  font-size: 18px;
  color: #888;
}

/* PAGE */
.page {
  margin-bottom: 20px;
  font-size: 28px;
}

/* EXISTING */
.page a {
  text-decoration: none;
  color: #111;
}

/* MISSING */
.page a.missing {
  color: #222;
  border-bottom: 1px dashed #222;
}

/* HOVER */
.page a:hover {
  opacity: 0.5;
}

/* DROP CAP */
.page a::first-letter {
  font-size: 30px;
}
</style>
</head>

<body>

<main>
  <div id="list"></div>
</main>

<script>
async function load() {
  const [pagesRes, topicsRes] = await Promise.all([
    fetch("/api/pages"),
    fetch("/topics.txt")
  ]);

  const pages = await pagesRes.json();
  const topicsText = await topicsRes.text();

  const list = document.getElementById("list");

  // существующие slug'и
  const existing = {};
  pages.forEach(p => {
    existing[p.slug] = p;
  });

  // темы из txt
  const topics = topicsText
    .split("\n")
    .map(t => t.trim())
    .filter(Boolean);

  // объединяем
  const all = topics.map(slug => {
    return {
      slug,
      title: existing[slug]?.title || slug,
      exists: !!existing[slug]
    };
  });

  // сортировка
  all.sort((a, b) => {
    return a.title.toLowerCase().localeCompare(b.title.toLowerCase());
  });

  // группировка
  const groups = {};
  all.forEach(p => {
    const letter = p.title[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(p);
  });

  // рендер
  list.innerHTML = Object.keys(groups).sort().map(letter => `
    <div class="letter">${letter}</div>

    ${groups[letter].map(p => `
      <div class="page">
        ${
          p.exists
            ? `<a href="/view.html?slug=${p.slug}">${p.title}</a>`
            : `<a class="missing" href="/editor.html?slug=${p.slug}">${p.title}</a>`
        }
      </div>
    `).join("")}

  `).join("");
}

load();
</script>

</body>
</html>
