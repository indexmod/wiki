<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndexMod Fashion and Art</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.svg">

<link rel="stylesheet" href="/styles.css">
</head>

<body>

<header>
  <a href="/" class="logo-wrap">
    <img src="/logo.png" class="logo">
  </a>

  <a class="new" href="/editor.html">+ new</a>
</header>

<main id="list"></main>

<script>
function cleanTitle(p) {
  let t = (p.title || "").trim();

  if (!t) {
    t = (p.slug || "")
      .replace(/-/g, " ")
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  return t;
}

function sectionLetter(title="") {
  const c = (title.trim()[0] || "#").toUpperCase();
  if (c >= "A" && c <= "Z") return c;
  return "#";
}

async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  const list = document.getElementById("list");

  const safe = (pages || []).filter(p => p && p.slug);

  if (!safe.length) {
    list.innerHTML = `<div class="empty">no pages yet</div>`;
    return;
  }

  const groups = {};

  for (const p of safe) {
    const title = cleanTitle(p);
    const letter = sectionLetter(title);

    if (!groups[letter]) groups[letter] = [];
    groups[letter].push({ ...p, title });
  }

  const letters = Object.keys(groups).sort();

  list.innerHTML = letters.map(letter => {
    const items = groups[letter]
      .sort((a,b) => a.title.localeCompare(b.title));

    return `
      <div class="section">
        <div class="section-title">${letter}</div>

        ${items.map(p => `
          <div class="item">
            <a href="/${p.slug}">
              <div class="title">${escapeHtml(p.title)}</div>
            </a>
          </div>
        `).join("")}

      </div>
    `;
  }).join("");
}

function escapeHtml(s="") {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

load();
</script>

</body>
</html>
