name = "wiki"
main = "worker.js"
compatibility_date = "2026-04-25"

# =========================
# STATIC FRONTEND
# =========================
[assets]
directory = "./public"
binding = "ASSETS"

# ⚠️ ВАЖНО:
# run_worker_first НЕ используется в Workers + Assets режиме
# (это вызывает ошибки в wrangler 4+)
# run_worker_first = []

# =========================
# ROUTING BEHAVIOR
# =========================
not_found_handling = "none"

# =========================
# R2 STORAGE (PAGES DB)
# =========================
[[r2_buckets]]
binding = "PAGES"
bucket_name = "indexmod-pages"
