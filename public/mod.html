<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indexmod — Modes</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f5f5f5;
  color: #111;
}

header {
  padding: 40px 60px 20px;
}

h1 {
  font-size: 24px;
  margin: 0 0 10px 0;
}

.note {
  font-size: 14px;
  line-height: 1.6;
  max-width: 700px;
}

main {
  padding: 40px 60px;
}

textarea {
  width: 100%;
  height: 400px;
  font-family: monospace;
  font-size: 14px;
  padding: 20px;
  border: none;
  outline: none;
  resize: vertical;
  background: white;
  box-shadow: 0 0 0 1px #ddd;
}

.actions {
  margin-top: 20px;
}

button {
  background: black;
  color: white;
  border: none;
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

.status {
  margin-left: 10px;
  font-size: 14px;
  color: #666;
}
</style>
</head>

<body>

<header>
  <h1>Modes</h1>

  <div class="note">
    Формат: <br><br>

    <code>slug | mode</code><br><br>

    Примеры:<br>
    <code>art | core</code><br>
    <code>fashion | core</code><br>
    <code>void aesthetics | speculative</code><br><br>

    • slug — используется как URL<br>
    • mode — тип или слой (core, speculative, archive, etc)<br>
    • одна строка = одна тема<br>
    • пустые строки игнорируются
  </div>
</header>

<main>
  <textarea id="editor"></textarea>

  <div class="actions">
    <button onclick="save()">Save</button>
    <span id="status" class="status"></span>
  </div>
</main>

<script>
async function load() {
  const res = await fetch("/topics.txt");
  const text = await res.text();

  document.getElementById("editor").value = text;
}

async function save() {
  const value = document.getElementById("editor").value;

  const res = await fetch("/api/topics", {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: value
  });

  const status = document.getElementById("status");

  if (res.ok) {
    status.textContent = "saved";
  } else {
    status.textContent = "error";
  }

  setTimeout(() => status.textContent = "", 2000);
}

load();
</script>

</body>
</html>
