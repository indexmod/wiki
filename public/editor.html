<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor</title>

<style>
body {
  margin: 0;
  font-family: Georgia;
  font-size: 22px;
}

header {
  position: fixed;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
}

input, textarea {
  width: 100%;
  border: none;
  outline: none;
  font-size: 22px;
  font-family: Georgia;
}

#wrap {
  padding: 100px 60px;
  max-width: 900px;
  margin: auto;
}

#title {
  font-size: 32px;
  font-weight: bold;
}

#slug {
  opacity: 0.5;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<header>
  <a href="/">Index</a>
  <span id="status">saved</span>
</header>

<div id="wrap">
  <input id="title" placeholder="title">
  <input id="slug" placeholder="slug">
  <textarea id="content" rows="20"></textarea>
</div>

<script>
let id = null;
let saveTimer = null;

const title = document.getElementById("title");
const slug = document.getElementById("slug");
const content = document.getElementById("content");
const status = document.getElementById("status");

const params = new URLSearchParams(location.search);
let currentSlug = params.get("slug");

async function load() {
  const res = await fetch("/api/page/" + currentSlug);
  const data = await res.json();

  id = data.id;

  title.value = data.title;
  slug.value = data.slug;
  content.value = data.content;
}

function autosave() {
  clearTimeout(saveTimer);
  status.textContent = "saving...";

  saveTimer = setTimeout(async () => {
    const res = await fetch("/api/page/" + (id || "new"), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        id,
        title: title.value,
        slug: slug.value,
        content: content.value
      })
    });

    const data = await res.json();

    id = data.id;

    // LIVE URL UPDATE (Obsidian feel)
    history.replaceState(null, "", "/editor.html?slug=" + data.slug);

    currentSlug = data.slug;

    status.textContent = "saved";

  }, 400);
}

title.oninput = slug.oninput = content.oninput = autosave;

load();
</script>

</body>
</html>
