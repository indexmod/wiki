name = "wiki"
main = "worker.js"
compatibility_date = "2026-04-25"

# =========================
# STATIC FRONTEND
# =========================
[assets]
directory = "./public"
binding = "ASSETS"

# ВАЖНО: worker всегда первым обрабатывает ВСЁ
run_worker_first = ["/*"]

# ⚠️ УБРАТЬ SPA MODE (он ломает slug routing)
not_found_handling = "none"

# =========================
# R2 STORAGE
# =========================
[[r2_buckets]]
binding = "PAGES"
bucket_name = "indexmod-pages"
