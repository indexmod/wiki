<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editor</title>

<link rel="icon" href="/favicon.svg">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  font-size: 26px;
  background: #fff;
  color: #000;
}

/* HEADER */
header {
  position: fixed;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  height: 40px;
}

/* SAVE */
.save {
  cursor: pointer;
}

/* MAIN */
main {
  padding: 140px 60px;
  max-width: 900px;
  margin: auto;
}

/* INPUTS */
input, textarea {
  width: 100%;
  font-family: Georgia, serif;
  font-size: 26px;
  border: none;
  outline: none;
  margin-bottom: 30px;
  background: transparent;
  color: #000;
}

/* TITLE */
#title {
  font-size: 42px;
}

/* TEXTAREA */
textarea {
  min-height: 60vh;
  resize: none;
}

/* MOBILE */
@media (max-width: 900px) {
  main {
    padding: 120px 20px;
  }

  #title {
    font-size: 32px;
  }

  input, textarea {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>

  <div class="save" onclick="save()">save</div>
</header>

<main>
  <input id="title" placeholder="Title">
  <textarea id="content" placeholder="Write..."></textarea>
</main>

<script>
let slug = new URLSearchParams(location.search).get("slug");

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");

// ================= LOAD =================
async function load() {
  if (!slug) return;

  const res = await fetch("/api/page/" + slug);
  if (!res.ok) return;

  const p = await res.json();

  titleEl.value = p.title || "";
  contentEl.value = p.content || "";
}

// ================= SAVE =================
async function save() {
  const base = slug || titleEl.value || "page";

  const res = await fetch("/api/page/" + base, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      title: titleEl.value,
      content: contentEl.value
    })
  });

  const p = await res.json();

  slug = p.slug;

  // 👉 сразу на страницу
  location.href = "/" + p.slug;
}

load();
</script>

</body>
</html>
