<!-- FILE: public/view.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>View</title>

<script src="/slugify.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<h1 id="title"></h1>
<div id="content"></div>

<a id="edit">edit</a>

<script>
const slug = new URLSearchParams(location.search).get("slug");

async function load() {
  const id = await fetch("/api/page/" + slug)
    .then(r => r.ok ? r.json() : null);

  if (!id) return;

  document.getElementById("title").innerText = id.title;
  document.getElementById("content").innerHTML = marked.parse(id.content || "");

  document.getElementById("edit").href = "/editor.html?id=" + id.id;
}

load();
</script>

</body>
</html>
