<!-- FILE: public/editor.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  padding: 60px;
  background: #fafafa;
}

input, textarea {
  width: 100%;
  font-size: 18px;
  margin-bottom: 20px;
  border: none;
  outline: none;
  background: transparent;
}

button {
  font-size: 18px;
  cursor: pointer;
  background: none;
  border: none;
}
</style>
</head>

<body>

<input id="title" placeholder="title">
<textarea id="content" placeholder="content"></textarea>

<button onclick="save()">Save</button>

<script>
const params = new URLSearchParams(location.search);
let id = params.get("id");

// =========================
// LOAD (by ID)
// =========================
async function load() {
  if (!id) return;

  const res = await fetch("/api/page/" + id);
  if (!res.ok) return;

  const data = await res.json();

  document.getElementById("title").value = data.title || "";
  document.getElementById("content").value = data.content || "";
}

// =========================
// SAVE (ID-FIRST)
// =========================
async function save() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  const res = await fetch("/api/page/" + (id || "new"), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, content })
  });

  const page = await res.json();

  // 🔥 ВАЖНО: фиксируем ID после создания
  id = page.id;

  // проверка (в консоль сразу видно архитектуру)
  console.log("SAVED PAGE:", page);

  // редирект на view через ID (источник истины)
  location.href = "/view.html?id=" + page.id;
}

load();
</script>

</body>
</html>
