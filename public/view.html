<script type="module">
import { markdownToHTML } from "/js/core/schema.js";

const slug = new URLSearchParams(location.search).get("slug");

async function load() {
  const res = await fetch(`/api/page/${slug}`);

  if (!res.ok) {
    document.body.innerHTML = "Not found";
    return;
  }

  const page = await res.json();

  document.getElementById("title").innerText = page.title;

  const html = markdownToHTML(page.content || "");

  document.getElementById("content").innerHTML = html;
}

load();
</script>
