<!-- FILE: editor.html -->
<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<title>Editor</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #fafafa;
  color: #111;
}

header {
  padding: 40px 60px;
}

.logo {
  width: 80px;
}

main {
  padding: 0 60px 60px;
  max-width: 900px;
}

#title {
  font-size: 36px;
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  height: 400px;
  border: none;
  outline: none;
  font-size: 18px;
  line-height: 1.6;
  background: transparent;
}

button {
  margin-top: 20px;
  border: none;
  background: none;
  font-size: 18px;
  cursor: pointer;
}
</style>

<script src="/slugify.js"></script>

</head>

<body>

<header>
  <a href="/">
    <img src="/logo.png" class="logo">
  </a>
</header>

<main>

<input id="title" placeholder="Title" />
<textarea id="content" placeholder="Start writing..."></textarea>

<button onclick="save()">Save</button>

</main>

<script>
const params = new URLSearchParams(location.search);

// ⚠️ ID — теперь главный
const id = params.get("id");

const titleInput = document.getElementById("title");
const contentInput = document.getElementById("content");

// =========================
// LOAD BY ID
// =========================
async function load() {
  if (!id) return;

  const res = await fetch("/api/page/" + id);

  if (!res.ok) return;

  const data = await res.json();

  titleInput.value = data.title || "";
  contentInput.value = data.content || "";
}

// =========================
// SAVE BY ID
// =========================
async function save() {
  if (!id) {
    alert("Missing ID");
    return;
  }

  const title = titleInput.value.trim();
  const content = contentInput.value;

  await fetch("/api/page/" + id, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, content })
  });

  // возвращаемся в чистый slug-view слой
  location.href = "/";
}

load();
</script>

</body>
</html>
