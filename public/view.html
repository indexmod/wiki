<!-- FILE: public/view.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>View</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  padding: 60px;
}

h1 {
  font-size: 40px;
}

.edit {
  position: fixed;
  top: 20px;
  right: 20px;
  text-decoration: none;
  color: #111;
}

.edit:hover {
  opacity: 0.6;
}

.muted {
  color: #999;
  font-size: 14px;
}
</style>
</head>

<body>

<a class="edit" id="edit">Edit</a>

<h1 id="title"></h1>
<div id="content"></div>
<div id="status" class="muted"></div>

<script>
const id = new URLSearchParams(location.search).get("id");

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");
const editEl = document.getElementById("edit");
const statusEl = document.getElementById("status");

async function load() {
  if (!id) {
    titleEl.innerText = "No ID";
    statusEl.innerText = "Missing page id";
    return;
  }

  try {
    const res = await fetch("/api/page/" + id);

    if (!res.ok) {
      titleEl.innerText = "Not found";
      statusEl.innerText = "Page does not exist";
      return;
    }

    const data = await res.json();

    titleEl.innerText = data.title || id;
    contentEl.innerText = data.content || "";

    editEl.href = "/editor.html?id=" + id;

  } catch (e) {
    console.error(e);
    statusEl.innerText = "Error loading page";
  }
}

load();
</script>

</body>
</html>
